<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0e0e;
      color: #f0ede6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: rgba(240,237,230,0.6);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    nav a:hover { color: #f0ede6; }

    hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,150,255,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      max-width: 760px;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.4);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
    }

    h1 em {
      font-style: italic;
      color: rgba(180,150,255,0.9);
    }

    .subcopy {
      font-size: 1.15rem;
      line-height: 1.7;
      color: rgba(240,237,230,0.55);
      max-width: 520px;
      margin: 0 auto 2.5rem;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #f0ede6;
      color: #0e0e0e;
    }

    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: rgba(240,237,230,0.6);
      border: 0.5px solid rgba(255,255,255,0.2);
    }

    .btn-ghost:hover {
      color: #f0ede6;
      border-color: rgba(255,255,255,0.5);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: rgba(240,237,230,0.2);
      border-top: 0.5px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Studio</div>
    <ul>
      <li><a href="#">Work</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <hero>
    <div class="glow"></div>
    <div class="hero-content">
      <p class="eyebrow">Welcome to the future</p>
      <h1>Make something <em>worth</em> remembering.</h1>
      <p class="subcopy">
        We help ambitious teams build products that people actually love.
        Bold ideas. Sharp execution. No compromises.
      </p>
      <div class="cta-group">
        <a href="#" class="btn btn-primary">Get started</a>
        <a href="#" class="btn btn-ghost">See our work</a>
      </div>
    </div>
  </hero>

  <footer>© 2026 Studio. All rights reserved.</footer>

</body>
</html>
